<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --device: #1a1f2e;
    --device-edge: #252b3d;
    --accent: #f5a623;
    --accent2: #4a6cf7;
    --screen-bg: #070a12;
    --text: #e8eaf0;
    --text-dim: #6b7280;
    --green: #00e5a0;
    --red: #ff4757;
    --font: 'Space Mono', monospace;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font);
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
  }

  .device {
    position: relative;
    width: 420px;
    background: var(--device);
    border-radius: 24px;
    border: 1.5px solid var(--device-edge);
    padding: 28px 24px 24px;
    box-shadow:
      0 0 0 1px #ffffff08,
      0 40px 80px #00000080,
      inset 0 1px 0 #ffffff10;
    z-index: 2;
  }

  .device-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }

  .device-brand {
    font-family: var(--font);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .status-dots {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: all 0.3s;
  }

  .dot.active   { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .dot.thinking { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 1s ease-in-out infinite; }
  .dot.error    { background: var(--red);   box-shadow: 0 0 8px var(--red); }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .screen {
    background: var(--screen-bg);
    border-radius: 12px;
    border: 1px solid #ffffff0f;
    padding: 18px;
    min-height: 220px;
    max-height: 320px;
    overflow-y: auto;
    margin-bottom: 18px;
    scrollbar-width: thin;
    scrollbar-color: #ffffff15 transparent;
  }

  .screen::-webkit-scrollbar { width: 4px; }
  .screen::-webkit-scrollbar-track { background: transparent; }
  .screen::-webkit-scrollbar-thumb { background: #ffffff15; border-radius: 2px; }

  .screen-idle {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 180px;
    gap: 10px;
  }

  .screen-idle-icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1.5px solid #ffffff15;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .screen-idle p {
    font-family: var(--font);
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.6;
  }

  .stream-line {
    font-family: var(--font);
    font-size: 12px;
    line-height: 1.8;
    margin-bottom: 4px;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }

  .stream-line .tag {
    font-family: var(--font);
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 2px;
    letter-spacing: 0.05em;
  }

  .tag-planner { background: #4a6cf720; color: #4a6cf7; border: 1px solid #4a6cf740; }
  .tag-executor { background: #00e5a020; color: #00e5a0; border: 1px solid #00e5a040; }
  .tag-critic   { background: #f5a62320; color: #f5a623; border: 1px solid #f5a62340; }
  .tag-done     { background: #00e5a030; color: #00e5a0; border: 1px solid #00e5a060; }
  .tag-error    { background: #ff475720; color: #ff4757; border: 1px solid #ff475740; }

  .stream-line .content { font-family: var(--font); color: var(--text); flex: 1; }

  .result-block {
    background: #00e5a008;
    border: 1px solid #00e5a020;
    border-radius: 8px;
    padding: 12px;
    margin-top: 8px;
  }

  .result-block .result-label {
    font-family: var(--font);
    font-size: 10px;
    color: var(--green);
    font-weight: 700;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .result-block .result-text {
    font-family: var(--font);
    font-size: 12px;
    color: var(--text);
    line-height: 1.8;
    white-space: pre-wrap;
  }

  .score-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #f5a62315;
    border: 1px solid #f5a62330;
    border-radius: 6px;
    padding: 4px 10px;
    font-family: var(--font);
    font-size: 11px;
    color: var(--accent);
    margin-top: 10px;
  }

  .input-area {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* goal box — taller, more prominent */
  .input-wrap textarea {
    width: 100%;
    background: var(--screen-bg);
    border: 1px solid #ffffff15;
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.7;
    min-height: 96px;
  }

  .input-wrap textarea:focus { border-color: var(--accent2); }
  .input-wrap textarea::placeholder { color: var(--text-dim); font-family: var(--font); }

  /* token label */
  .token-label {
    font-family: var(--font);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }

  /* token box — comfortable height */
  .token-wrap input {
    width: 100%;
    background: var(--screen-bg);
    border: 1px solid #ffffff10;
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text-dim);
    font-family: var(--font);
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .token-wrap input:focus { border-color: #ffffff25; color: var(--text); }
  .token-wrap input::placeholder { color: #ffffff25; font-family: var(--font); }

  .run-btn {
    width: 100%;
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .run-btn:hover   { transform: translateY(-1px); box-shadow: 0 8px 24px #f5a62340; }
  .run-btn:active  { transform: translateY(0); }
  .run-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  .run-btn.running { background: var(--device-edge); color: var(--text-dim); }

  .device-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid #ffffff08;
  }

  .screw {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--device-edge);
    border: 1px solid #ffffff12;
    position: relative;
  }

  .screw::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(45deg);
    width: 6px;
    height: 1px;
    background: #ffffff20;
  }

  .device-model {
    font-family: var(--font);
    font-size: 10px;
    color: #ffffff20;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>

<div class="device">
  <div class="device-top">
    <span class="device-brand">AI Agent v1</span>
    <div class="status-dots">
      <div class="dot active" id="d1" title="postgres"></div>
      <div class="dot active" id="d2" title="redis"></div>
      <div class="dot active" id="d3" title="models"></div>
    </div>
  </div>

  <div class="screen" id="screen">
    <div class="screen-idle" id="idle-state">
      <div class="screen-idle-icon">⚡</div>
      <p>Multi-agent system ready.<br>Type a goal and press RUN.</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="goal-input" placeholder="What do you want the agent to do?" rows="3"></textarea>
    </div>
    <div class="token-wrap">
      <div class="token-label">ACCESS TOKEN</div>
      <input type="password" id="token-input" placeholder="enter your access token" />
    </div>
    <button class="run-btn" id="run-btn" onclick="runAgent()">
      ▶ &nbsp; Run Agent
    </button>
  </div>

  <div class="device-bottom">
    <div class="screw"></div>
    <span class="device-model">LangGraph · Claude · GPT-4o</span>
    <div class="screw"></div>
  </div>
</div>

<script>
  const API_BASE = 'https://ai-agent-tvpo.onrender.com';

  function addLine(tag, content, tagClass) {
    const idle = document.getElementById('idle-state');
    if (idle) idle.remove();
    const screen = document.getElementById('screen');
    const line = document.createElement('div');
    line.className = 'stream-line';
    line.innerHTML = `<span class="tag ${tagClass}">${tag}</span><span class="content">${content}</span>`;
    screen.appendChild(line);
    screen.scrollTop = screen.scrollHeight;
  }

  function showResult(text, score) {
    const screen = document.getElementById('screen');
    const block = document.createElement('div');
    block.className = 'result-block';
    block.innerHTML = `
      <div class="result-label">FINAL ANSWER</div>
      <div class="result-text">${text}</div>
      ${score ? `<div class="score-badge">critic score ${score}/10 &nbsp;✓</div>` : ''}
    `;
    screen.appendChild(block);
    screen.scrollTop = screen.scrollHeight;
  }

  function setStatus(state) {
    ['d1','d2','d3'].forEach(id => {
      const d = document.getElementById(id);
      d.className = 'dot';
      if (state === 'thinking') d.classList.add('thinking');
      else if (state === 'done') d.classList.add('active');
      else if (state === 'error') d.classList.add('error');
    });
  }

  async function runAgent() {
    const goal  = document.getElementById('goal-input').value.trim();
    const token = document.getElementById('token-input').value.trim();
    const btn   = document.getElementById('run-btn');
    const screen = document.getElementById('screen');

    if (!goal)  { alert('Please enter a goal.'); return; }
    if (!token) { alert('Please enter your access token.'); return; }

    screen.innerHTML = '';
    btn.disabled = true;
    btn.classList.add('running');
    btn.textContent = '⏳  Agent thinking...';
    setStatus('thinking');

    let lastResult = '';
    let criticScore = null;

    try {
      const response = await fetch(`${API_BASE}/run`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ goal })
      });

      if (!response.ok) {
        const err = await response.json();
        addLine('ERROR', err.detail || `HTTP ${response.status}`, 'tag-error');
        setStatus('error');
        return;
      }

      const reader  = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const raw = line.slice(6).trim();
          if (!raw || raw === '[DONE]') continue;
          try {
            const data = JSON.parse(raw);
            if (data.planner) {
              addLine('PLAN', `${(data.planner.plan||[]).length} steps planned`, 'tag-planner');
            }
            if (data.executor) {
              addLine('EXEC', `step ${data.executor.step_index||0} complete`, 'tag-executor');
              const obs = data.executor.observations || [];
              if (obs.length > 0) lastResult = obs[obs.length - 1];
              if (data.executor.result) lastResult = data.executor.result;
            }
            if (data.critic) {
              criticScore = data.critic.critic_score;
              const attempts = data.critic.attempt_count || 0;
              addLine('CRITIC',
                criticScore >= 7
                  ? `score ${criticScore}/10 — passed`
                  : `score ${criticScore}/10 — retrying (attempt ${attempts})`,
                'tag-critic'
              );
            }
          } catch(e) {}
        }
      }

      if (lastResult) {
        showResult(lastResult, criticScore);
        addLine('DONE', 'task complete', 'tag-done');
        setStatus('done');
      }

    } catch (err) {
      addLine('ERROR', err.message, 'tag-error');
      setStatus('error');
    } finally {
      btn.disabled = false;
      btn.classList.remove('running');
      btn.innerHTML = '▶ &nbsp; Run Agent';
    }
  }

  document.getElementById('goal-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) runAgent();
  });
</script>
</body>
</html>
